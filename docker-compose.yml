services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inventrack
      POSTGRES_USER: inventrack
      POSTGRES_PASSWORD: inventrack_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioaccess
      MINIO_ROOT_PASSWORD: miniosecret
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
